apiVersion: v1
kind: Pod
metadata:
  name: nignx-app
  labels:
    app: nginx-app
spec:
  containers: 
   - name: nginxc
     image: nginx:latest
     ports:
       - containerPort: 80
     resources:
       requests:
          cpu: "10m"
          memory: "150Mi"
       limits:
          cpu: "100m"
          memory: "300Mi"	 
